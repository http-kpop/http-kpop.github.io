<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <linearGradient id="kpop-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff2d78"/>
      <stop offset="45%"  stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#00f0ff"/>
    </linearGradient>
    <linearGradient id="card-grad-4xx" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1a0a35"/>
      <stop offset="100%" stop-color="#0e0514"/>
    </linearGradient>
    <linearGradient id="card-grad-2xx" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#071a12"/>
      <stop offset="100%" stop-color="#040e0a"/>
    </linearGradient>
    <linearGradient id="card-grad-5xx" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#1a0514"/>
      <stop offset="100%" stop-color="#0e0309"/>
    </linearGradient>
    <linearGradient id="card-grad-3xx" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#051a1a"/>
      <stop offset="100%" stop-color="#030d0d"/>
    </linearGradient>
    <filter id="text-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="subtle-glow">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="banner-clip">
      <rect width="1280" height="640" rx="0"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="#06030f"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-width="0.3" opacity="0.04">
    <line x1="0"    y1="80"  x2="1280" y2="80"/>
    <line x1="0"    y1="160" x2="1280" y2="160"/>
    <line x1="0"    y1="240" x2="1280" y2="240"/>
    <line x1="0"    y1="320" x2="1280" y2="320"/>
    <line x1="0"    y1="400" x2="1280" y2="400"/>
    <line x1="0"    y1="480" x2="1280" y2="480"/>
    <line x1="0"    y1="560" x2="1280" y2="560"/>
    <line x1="160"  y1="0"   x2="160"  y2="640"/>
    <line x1="320"  y1="0"   x2="320"  y2="640"/>
    <line x1="480"  y1="0"   x2="480"  y2="640"/>
    <line x1="640"  y1="0"   x2="640"  y2="640"/>
    <line x1="800"  y1="0"   x2="800"  y2="640"/>
    <line x1="960"  y1="0"   x2="960"  y2="640"/>
    <line x1="1120" y1="0"   x2="1120" y2="640"/>
  </g>

  <!-- Stars -->
  <g fill="white">
    <circle cx="72"   cy="48"  r="1.2" opacity="0.7"/>
    <circle cx="210"  cy="92"  r="0.8" opacity="0.5"/>
    <circle cx="380"  cy="30"  r="1.5" opacity="0.6"/>
    <circle cx="512"  cy="70"  r="0.8" opacity="0.4"/>
    <circle cx="660"  cy="22"  r="1"   opacity="0.7"/>
    <circle cx="790"  cy="55"  r="1.2" opacity="0.5"/>
    <circle cx="910"  cy="18"  r="0.9" opacity="0.6"/>
    <circle cx="1050" cy="78"  r="1.4" opacity="0.4"/>
    <circle cx="1180" cy="35"  r="1"   opacity="0.7"/>
    <circle cx="50"   cy="200" r="0.8" opacity="0.3"/>
    <circle cx="130"  cy="320" r="1.2" opacity="0.4"/>
    <circle cx="1220" cy="180" r="1"   opacity="0.5"/>
    <circle cx="1140" cy="310" r="0.8" opacity="0.3"/>
    <circle cx="30"   cy="480" r="1"   opacity="0.4"/>
    <circle cx="1250" cy="490" r="1.2" opacity="0.5"/>
    <circle cx="100"  cy="590" r="0.8" opacity="0.3"/>
    <circle cx="600"  cy="610" r="1"   opacity="0.4"/>
    <circle cx="1100" cy="600" r="0.9" opacity="0.35"/>
    <circle cx="430"  cy="580" r="1.1" opacity="0.3"/>
    <circle cx="840"  cy="590" r="0.8" opacity="0.4"/>
  </g>

  <!-- Floating status code cards — left side -->
  <!-- 404 card -->
  <g opacity="0.75" transform="rotate(-6, 80, 260)">
    <rect x="28" y="200" width="108" height="120" rx="8" fill="url(#card-grad-4xx)" stroke="#ffe156" stroke-width="0.8" stroke-opacity="0.5"/>
    <rect x="28" y="200" width="108" height="60"  rx="8" fill="#ffe15612"/>
    <rect x="28" y="256" width="108" height="4"   fill="#ffe156" opacity="0.15"/>
    <text font-family="monospace" font-weight="700" font-size="26" fill="#ffe156"     x="82"  y="237" text-anchor="middle" opacity="0.9">404</text>
    <text font-family="monospace" font-size="9"    fill="#8b7baa"                     x="82"  y="275" text-anchor="middle">Not Found</text>
    <text font-family="monospace" font-size="8"    fill="#c084fc" opacity="0.6"        x="82"  y="292" text-anchor="middle">사라진 아이돌</text>
  </g>

  <!-- 200 card -->
  <g opacity="0.7" transform="rotate(4, 100, 430)">
    <rect x="40" y="390" width="108" height="120" rx="8" fill="url(#card-grad-2xx)" stroke="#4ade80" stroke-width="0.8" stroke-opacity="0.5"/>
    <rect x="40" y="390" width="108" height="60"  rx="8" fill="#4ade8010"/>
    <rect x="40" y="446" width="108" height="4"   fill="#4ade80" opacity="0.15"/>
    <text font-family="monospace" font-weight="700" font-size="26" fill="#4ade80"     x="94"  y="427" text-anchor="middle" opacity="0.9">200</text>
    <text font-family="monospace" font-size="9"    fill="#8b7baa"                     x="94"  y="465" text-anchor="middle">OK</text>
    <text font-family="monospace" font-size="8"    fill="#c084fc" opacity="0.6"        x="94"  y="482" text-anchor="middle">완벽해</text>
  </g>

  <!-- Floating status code cards — right side -->
  <!-- 500 card -->
  <g opacity="0.75" transform="rotate(7, 1170, 240)">
    <rect x="1130" y="185" width="108" height="120" rx="8" fill="url(#card-grad-5xx)" stroke="#ff2d78" stroke-width="0.8" stroke-opacity="0.5"/>
    <rect x="1130" y="185" width="108" height="60"  rx="8" fill="#ff2d7810"/>
    <rect x="1130" y="241" width="108" height="4"   fill="#ff2d78" opacity="0.15"/>
    <text font-family="monospace" font-weight="700" font-size="26" fill="#ff2d78"     x="1184" y="222" text-anchor="middle" opacity="0.9">500</text>
    <text font-family="monospace" font-size="9"    fill="#8b7baa"                     x="1184" y="260" text-anchor="middle">Server Error</text>
    <text font-family="monospace" font-size="8"    fill="#c084fc" opacity="0.6"        x="1184" y="277" text-anchor="middle">서버 폭발</text>
  </g>

  <!-- 301 card -->
  <g opacity="0.65" transform="rotate(-5, 1160, 420)">
    <rect x="1116" y="375" width="108" height="120" rx="8" fill="url(#card-grad-3xx)" stroke="#00f0ff" stroke-width="0.8" stroke-opacity="0.5"/>
    <rect x="1116" y="375" width="108" height="60"  rx="8" fill="#00f0ff0e"/>
    <rect x="1116" y="431" width="108" height="4"   fill="#00f0ff" opacity="0.15"/>
    <text font-family="monospace" font-weight="700" font-size="26" fill="#00f0ff"     x="1170" y="412" text-anchor="middle" opacity="0.9">301</text>
    <text font-family="monospace" font-size="9"    fill="#8b7baa"                     x="1170" y="450" text-anchor="middle">Moved</text>
    <text font-family="monospace" font-size="8"    fill="#c084fc" opacity="0.6"        x="1170" y="467" text-anchor="middle">영구 이적</text>
  </g>

  <!-- Top badge -->
  <rect x="556" y="142" width="168" height="24" rx="2" fill="none" stroke="#00f0ff" stroke-width="0.8" stroke-opacity="0.6"/>
  <text font-family="monospace" font-size="10" fill="#00f0ff" opacity="0.8" x="640" y="158" text-anchor="middle" letter-spacing="3">HTTP STATUS CODES</text>

  <!-- Main title: HTTP -->
  <text
    font-family="'Arial Black', 'Noto Sans KR', sans-serif"
    font-weight="900"
    font-size="58"
    fill="#3a2a5a"
    x="640" y="238"
    text-anchor="middle"
    letter-spacing="12"
  >HTTP://</text>

  <!-- Main title: KPOP (gradient) -->
  <text
    font-family="'Arial Black', 'Noto Sans KR', sans-serif"
    font-weight="900"
    font-size="148"
    fill="url(#kpop-grad)"
    x="640" y="390"
    text-anchor="middle"
    letter-spacing="-2"
    filter="url(#text-glow)"
  >K-POP</text>

  <!-- Divider line with diamond -->
  <line x1="320" y1="418" x2="580" y2="418" stroke="#c084fc" stroke-width="0.6" stroke-opacity="0.4"/>
  <text font-size="12" fill="#ffe156" opacity="0.7" x="640" y="423" text-anchor="middle">✦</text>
  <line x1="700" y1="418" x2="960" y2="418" stroke="#c084fc" stroke-width="0.6" stroke-opacity="0.4"/>

  <!-- Subtitle -->
  <text
    font-family="monospace"
    font-size="16"
    fill="#8b7baa"
    x="640" y="456"
    text-anchor="middle"
    letter-spacing="2"
  >Every HTTP status code as a K-pop moment</text>

  <!-- Korean subtitle -->
  <text
    font-family="'Noto Sans KR', monospace"
    font-size="14"
    fill="#c084fc"
    opacity="0.55"
    x="640" y="482"
    text-anchor="middle"
    letter-spacing="1"
  >케이팝으로 보는 HTTP</text>

  <!-- URL pill -->
  <rect x="490" y="516" width="300" height="36" rx="4" fill="#00f0ff0c" stroke="#00f0ff" stroke-width="0.8" stroke-opacity="0.35"/>
  <text font-family="monospace" font-size="13" fill="#8b7baa" x="570" y="538" letter-spacing="0.5">http-kpop.github.io/</text>
  <text font-family="monospace" font-size="13" fill="#ff2d78"  x="958" y="538" text-anchor="end" font-style="italic">[status_code]</text>

  <!-- Bottom row: stat pills -->
  <g opacity="0.5">
    <!-- 1xx pill -->
    <rect x="418" y="572" width="52" height="20" rx="2" fill="#c084fc18" stroke="#c084fc" stroke-width="0.6"/>
    <text font-family="monospace" font-size="9" fill="#c084fc" x="444" y="585" text-anchor="middle">1xx</text>

    <!-- 2xx pill -->
    <rect x="478" y="572" width="52" height="20" rx="2" fill="#4ade8018" stroke="#4ade80" stroke-width="0.6"/>
    <text font-family="monospace" font-size="9" fill="#4ade80" x="504" y="585" text-anchor="middle">2xx</text>

    <!-- 3xx pill -->
    <rect x="538" y="572" width="52" height="20" rx="2" fill="#00f0ff18" stroke="#00f0ff" stroke-width="0.6"/>
    <text font-family="monospace" font-size="9" fill="#00f0ff" x="564" y="585" text-anchor="middle">3xx</text>

    <!-- 4xx pill -->
    <rect x="598" y="572" width="52" height="20" rx="2" fill="#ffe15618" stroke="#ffe156" stroke-width="0.6"/>
    <text font-family="monospace" font-size="9" fill="#ffe156" x="624" y="585" text-anchor="middle">4xx</text>

    <!-- 5xx pill -->
    <rect x="658" y="572" width="52" height="20" rx="2" fill="#ff2d7818" stroke="#ff2d78" stroke-width="0.6"/>
    <text font-family="monospace" font-size="9" fill="#ff2d78" x="684" y="585" text-anchor="middle">5xx</text>

    <!-- MIT pill -->
    <rect x="730" y="572" width="52" height="20" rx="2" fill="#8b7baa18" stroke="#8b7baa" stroke-width="0.6"/>
    <text font-family="monospace" font-size="9" fill="#8b7baa" x="756" y="585" text-anchor="middle">MIT</text>

    <!-- iaas pill -->
    <rect x="790" y="572" width="72" height="20" rx="2" fill="#8b7baa18" stroke="#8b7baa" stroke-width="0.6"/>
    <text font-family="monospace" font-size="9" fill="#8b7baa" x="826" y="585" text-anchor="middle">IaaS ✦</text>
  </g>
</svg>
